# .vibe.yaml - Agent Vibe Governor · IBA Intent Certificate
# Patent GB2603013.0 (Pending) · intentbound.com

intent:
  description: "Build a SaaS landing page with email capture. No payment integration. No production deploy."

scope:
  - create
  - component
  - style
  - tailwind
  - form
  - mock
  - staging
  - frontend
  - landing
  - email
  - write

denied:
  - stripe
  - payment
  - secret
  - dependency
  - external_api
  - production_deploy
  - production-deployment
  - database_write

default_posture: DENY_ALL

kill_threshold: "production_deploy | production-deployment | payment | secret"

spend_limits:
  max_api_calls: 500
  max_tokens: 100000

temporal_scope:
  hard_expiry: "2026-12-31"

team_mode:
  audit_level: "full"
